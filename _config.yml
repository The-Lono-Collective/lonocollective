title: Lono&emsp;&emsp;Collective<sup>&reg;</sup>
tagline: Safety Evaluation for Mental Health AI Systems
description: Independent evaluation frameworks for AI systems making suicide risk assessments, crisis decisions, and psychiatric diagnoses. When your system's failures could harm or kill someone, we help you identify risks before they generate lawsuits, regulatory action, or deaths.
email: contact@lonocollective.ai

url: "https://lonocollective.ai"
baseurl: ""

markdown: kramdown
highlighter: rouge
permalink: pretty

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

# Blog post URLs: /blog/YYYY/MM/DD/slug/
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      permalink: /blog/:year/:month/:day/:title/

# Build settings
sass:
  sass_dir: _sass
  style: compressed

# Keep internal files out of the published site. Jekyll publishes EVERY top-level
# file by default (anything not dot/underscore-prefixed or listed here), so each
# internal file must be excluded explicitly or it becomes a public, indexable URL.
exclude:
  # Build tooling / dependency manifests
  - README.md
  - Gemfile
  - Gemfile.lock
  - package.json
  - babel.config.js
  - src/
  - vendor/
  # Internal only — AI/agent instructions, engineering notes, automation, raw data
  - CLAUDE.md
  - docs/                              # notes, specs, plans, source PDFs — never published
  - check_feeds.py
  - comprehensive_search.py
  - search_regulations.py
  - mental_health_ai_regulations_2025.json
